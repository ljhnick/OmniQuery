<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniQuery: Personalized Search Engine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row">

    <div class="col-10">
      <!-- <h3 class="card-title">Query your personal memory with OmniQuery</h5> -->
      <div class="row g-3 align-items-center">
        <div class="col-auto">
          <label for="enterQuery" class="col-form-label">Enter your query: </label>
        </div>
        <div class="col">
          <input type="text" class="form-control" id="userInputQuery">
        </div>
        <div class="col-auto">
          <button type="submit" class="btn btn-primary" onclick="processQuery()">Search</button>
        </div>
        <!-- <div class="mb-3">
          <label for="enterQuery" class="form-label">Enter your query: </label>
          <input type="text" class="form-control" aria-label="Text input with checkbox" id="userInputQuery">
        </div> -->
      </div>
      <!-- <button type="submit" class="btn btn-primary" onclick="processQuery()">Submit</button> -->
      <hr>

      <div class="card">
        <div class="card-body">
          <div class="row">
            <label for="enterQuery" class="form-label">Results: </label>
            <p id="displayText"></p>
          </div>
    
          <div class="row">
            <label for="enterQuery" class="form-label">Reference memory: </label>
            <div id="image-container"></div>
          </div>
        </div>
        
  
      </div>

      
    </div>
    

    <div class="col">
      <button type="submit" class="btn btn-primary" onclick="init()">Initialize</button>
      <div class="row" style="margin-top: 10px;">
        <div class="col-auto">
          <span class="badge rounded-pill text-bg-warning" style="display: none;" id="badgeLoading">Loading</span>
          <span class="badge rounded-pill text-bg-success" style="display: none;" id="badgeLoaded">Loaded</span>
          <span class="badge rounded-pill text-bg-warning" style="display: none;" id="badgeSearching">Searching</span>
          <span class="badge rounded-pill text-bg-success" style="display: none;" id="badgeFinished">Finished</span>
        </div>
      </div>
      <div class="row">
        <label for="enterQuery" class="col-form-label" style="display: none;">time cost: </label>
        <p id="timeCostText"></p>
      </div>
      
    </div>

  </div>
  
  

  <!-- Text Display Area -->
  <!-- <div class="row mt-4">
    <label for="enterQuery" class="form-label">Results: </label>
    <div class="col-md-12">
      <p id="displayText"></p>
    </div>
  </div> -->

    <label for="enterQuery" class="form-label">Reference memory: </label>
    <div class="col-md-12">
      <div id="image-container"></div>
    </div>
  </div> -->
  

<script src="/static/js/processText.js"></script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
